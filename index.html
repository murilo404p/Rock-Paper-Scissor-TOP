<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper and Scissor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="./img/5930147.png" type="image/x-icon">
</head>
<body>
    <header>
      <p>ROCK PAPER SCISSOR</p>
    </header>

    <section class="container">
      <div class="content">  
        <p class="paragraph" id="paragraph">First to score 5 points wins the game!</p>
        <div class="container-points">
          <div class="pointsHuman">
            <div id="human">🧑</div>
            <p id="scoreHumUI">Points: 0</p>
          </div>
          <p id="X">X</p>
          <div class="pointsComputer">
            <div id="computer">🖥️</div>
            <p id="scoreCompUI">Points: 0</p>
          </div>
        </div>
  
        <div class="container-plays">
          <button class="sign">
            <div class="moves" id="rock">👊</div>
            <P id="text">ROCK</P>
          </button>
          <button class="sign" >
            <div class="moves" id="paper">🤚</div>
            <p id="text">PAPER</p>
          </button>
          <button class="sign">
            <div class="moves" id="scissors">✌️</div>
            <P id="text">SCISSOR</P>
          </button>
        </div>
      </div>
    </section>

  <script src="script.js" defer></script>
</body>
</html>
