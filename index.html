<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper and Scissor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <header>
      <p>ROCK PAPER SCISSOR</p>
    </header>

    <section class="container">
      <div class="content">  
        <div class="container-points">
          <div class="pointsHuman">
            <div id="human">🧑</div>
            <p>Points: 0</p>
          </div>
          <p id="X">X</p>
          <div class="pointsComputer">
            <div id="computer">🖥️</div>
            <p>Points: 0</p>
          </div>
        </div>
  
        <div class="container-plays">
          <div class="sign">
            <div id="hands">✊</div>
            <P id="type">ROCK</P>
          </div>
          <div class="sign">
            <div id="hands">🤚</div>
            <p id="type">PAPER</p>
          </div>
          <div class="sign">
            <div id="hands">✌️</div>
            <P id="type">SCISSOR</P>
          </div>
        </div>
      </div>
    </section>

  <script src="script.js" defer></script>
</body>
</html>
